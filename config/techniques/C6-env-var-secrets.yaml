# Technique: Environment variable secrets
# ID: C6
# Tactic: Credential Access

id: C6
name: Environment variable secrets
enabled: true

mitre:
  technique_id: T1552.001
  technique_name: "Unsecured Credentials: Credentials In Files"
  tactic: credential-access
  data_sources: [Container, Process]

cis_controls: []

severity: high

description: |
  Reads the process environment from /proc/self/environ inside a target
  pod, searching for credential patterns. Environment variables are the
  most common (and least secure) method of injecting secrets into
  containers. Unlike volume-mounted secrets, env vars are visible via
  the Kubernetes API to anyone who can describe the pod.

execution:
  mode: exec
  requires_target_pod: true

  probes:
    - type: command
      run: |
        echo "[*] Checking environment for credential patterns..."
        ENV=$(cat /proc/self/environ 2>/dev/null | tr '\0' '\n' || env)
        # Search for common credential patterns
        echo "$ENV" | grep -iE '^(PASSWORD|SECRET|TOKEN|API_KEY|AWS_|DATABASE_URL|DB_PASS|REDIS_URL|MONGO_URI|DSN)' | while read line; do
            KEY=$(echo "$line" | cut -d= -f1)
            # Mask the value — show key only for evidence
            echo "ENV_SECRET_FOUND:$KEY"
        done
        TOTAL=$(echo "$ENV" | grep -ciE '^(PASSWORD|SECRET|TOKEN|API_KEY|AWS_|DATABASE_URL|DB_PASS|REDIS_URL|MONGO_URI|DSN)' || true)
        echo "ENV_SECRET_COUNT:$TOTAL"

  evidence_markers:
    - marker: "ENV_SECRET_FOUND"
      evidence: "Credential-like environment variable discovered"
      impact: "Secrets exposed via environment variables are visible to anyone who can describe the pod"
    - marker: "ENV_SECRET_COUNT"
      evidence: "Count of credential-pattern environment variables"

success_indicators:
  - "ENV_SECRET_FOUND"

impact:
  - "Secrets in environment variables are visible via kubectl describe pod"
  - "Process environment is readable from /proc by any user in the container"
  - "Environment variables survive in core dumps and error logs"

remediation: |
  Use volume-mounted secrets instead of environment variable injection.
  Set automountServiceAccountToken: false if the pod doesn't need API access.
  Consider using a secrets CSI driver for external secret management.
