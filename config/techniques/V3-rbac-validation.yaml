# Technique: RBAC validation
# ID: V3
# Tactic: Defense Validation

id: V3
name: RBAC validation
enabled: true

mitre:
  technique_id: T1078.004
  technique_name: "Valid Accounts: Cloud Accounts"
  tactic: defense-validation
  data_sources: [Kubernetes API]

severity: info

description: |
  Analyzes RBAC bindings for excessive permissions without making any
  changes. Checks for cluster-admin bindings, wildcard rules, privilege
  escalation paths, and overly permissive service account permissions.

  Read-only analysis — no resources created or modified.

execution:
  mode: api

  api_calls:
    - resource: validate_controls
      verb: validate
      parameters:
        control_type: rbac

  parameters:
    - name: control_type
      default: rbac

success_indicators:
  - "all_passed"

impact:
  - "Failed validation means RBAC is overly permissive"
  - "Service accounts may have cluster-admin or wildcard access"

remediation: |
  Follow the principle of least privilege. Replace cluster-admin bindings
  with specific, namespace-scoped Roles. Eliminate wildcard rules.
  Use 'kubectl auth can-i --list' to audit effective permissions.
  Set automountServiceAccountToken: false on pods that don't need API access.
