# Technique: Enumerate secrets metadata
# ID: R7
# Tactic: Discovery

id: R7
name: Enumerate secrets metadata
enabled: true

mitre:
  technique_id: T1552
  technique_name: "Unsecured Credentials"
  tactic: discovery
  data_sources: [Kubernetes API]

severity: medium

description: |
  Lists secrets in the target namespace, collecting name and type
  (but not values) to identify high-value targets for C2 (secret
  enumeration). Types include Opaque, kubernetes.io/tls,
  kubernetes.io/dockerconfigjson, and kubernetes.io/service-account-token.

execution:
  mode: api

  api_calls:
    - resource: secrets
      verb: list
      fields: [metadata.name, type]

success_indicators:
  - "secrets_found"

impact:
  - "Maps secret names revealing credentials, TLS certs, registry auth"
  - "Guides targeted C2 exploitation for highest-value secrets"

remediation: |
  Restrict secret list permissions. Use RBAC to limit which SAs can list
  secrets — most workloads only need access to specific secrets via
  volume mounts, not list permission on all secrets in the namespace.
  Consider external secret managers (Vault, AWS Secrets Manager).
