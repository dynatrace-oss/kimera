# Technique: Enumerate service accounts
# ID: R4
# Tactic: Discovery

id: R4
name: Enumerate service accounts
enabled: true

mitre:
  technique_id: T1087.004
  technique_name: "Account Discovery: Cloud Account"
  tactic: discovery
  data_sources: [Kubernetes API]

severity: low

description: |
  Lists service accounts in the target namespace and checks which
  ones have automountServiceAccountToken enabled. Identifies SAs that
  are candidates for token theft (C1) or RBAC escalation (E8).

execution:
  mode: api

  api_calls:
    - resource: serviceaccounts
      verb: list

success_indicators:
  - "serviceaccounts_found"

impact:
  - "Identifies service accounts with auto-mounted tokens"
  - "Maps SA-to-workload bindings for credential theft planning"

remediation: |
  Set automountServiceAccountToken: false on service accounts and pods
  that don't need API access. Use distinct SAs per workload — never
  share the default SA across deployments.
