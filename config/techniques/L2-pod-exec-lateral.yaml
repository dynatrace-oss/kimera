id: L2
name: Pod exec lateral movement
enabled: true

mitre:
  technique_id: T1609
  technique_name: "Container Administration Command"
  tactic: lateral-movement
  data_sources: [Command, Process]

cis_controls:
  - "5.1.3"

severity: high

description: |
  Uses a stolen or escalated ServiceAccount token to exec into other
  pods in the namespace or across namespaces. This is the primary
  lateral movement technique in Kubernetes — moving from a compromised
  pod to other pods using API-level access.

  Chain: C1 (steal token) → R2 (enumerate pods) → L2 (exec into target)

execution:
  mode: exec
  requires_target_pod: true

  probes:
    - type: command
      run: |
        SA_DIR="/var/run/secrets/kubernetes.io/serviceaccount"
        if [ -f "$SA_DIR/token" ]; then
            TOKEN=$(cat "$SA_DIR/token")
            APISERVER="https://kubernetes.default.svc"
            # Attempt to list pods in the namespace
            PODS=$(wget -qO- --header="Authorization: Bearer $TOKEN" \
              --no-check-certificate \
              "$APISERVER/api/v1/namespaces/{{ namespace }}/pods" 2>/dev/null)
            if echo "$PODS" | grep -q '"name"'; then
                POD_COUNT=$(echo "$PODS" | grep -c '"name"')
                echo "LATERAL_TARGETS:${POD_COUNT}"
            else
                echo "LATERAL_DENIED"
            fi
        else
            echo "NO_TOKEN"
        fi

  evidence_markers:
    - marker: "LATERAL_TARGETS"
      evidence: "Can enumerate pods for lateral movement"
      impact: "SA token has pods/list — can identify lateral movement targets"
    - marker: "LATERAL_DENIED"
      evidence: "SA token lacks pods/list permission"
      impact: "Lateral movement via pod enumeration is blocked"
    - marker: "NO_TOKEN"
      evidence: "No SA token mounted in pod"

success_indicators:
  - "LATERAL_TARGETS"

impact:
  - "Identify all pods reachable from compromised identity"
  - "Chain with pods/exec permission for code execution in other containers"
  - "Cross-namespace movement if ClusterRole is bound"

remediation: |
  Set automountServiceAccountToken: false on pods that don't need API access.
  Scope ServiceAccount Roles to minimum required resources.
  Never bind pods/exec to workload ServiceAccounts.
