id: C7
name: List secrets (Falco-invisible)
enabled: true

mitre:
  technique_id: T1552.007
  technique_name: "Unsecured Credentials: Container API"
  tactic: credential-access
  data_sources: [Container]

cis_controls:
  - "5.1.2"
  - "5.4.1"

severity: critical

description: |
  Enumerates secrets in the target namespace using LIST (not GET).
  
  Falco's default "K8s Secret Get Successfully" rule matches
  ka.verb=get (GET individual secret by name). The LIST verb
  enumerates ALL secrets in a namespace and returns their full
  content, but triggers NO default Falco rule.

  This is a concrete detection gap: the most dangerous secret
  access pattern (bulk enumeration) is invisible to the most
  popular K8s runtime security tool.

  Differs from C2: C2 tests RBAC permissions for secrets via
  SelfSubjectAccessReview. C7 performs the actual LIST to
  demonstrate the Falco detection gap.

execution:
  mode: api
  requires_target_pod: false

  api_calls:
    - resource: secrets
      verb: list
      scope: namespace
      description: "LIST all secrets — invisible to default Falco rules"

  evidence_markers:
    - marker: "SECRETS_LISTED"
      evidence: "Bulk secret enumeration via LIST succeeded"
      impact: "All secrets in namespace exposed — no Falco alert generated"
    - marker: "LIST_DENIED"
      evidence: "RBAC denied secrets LIST"
      impact: "Secret enumeration blocked by least-privilege RBAC"

success_indicators:
  - "SECRETS_LISTED"

impact:
  - "All secrets (passwords, API keys, TLS certs) in namespace exposed"
  - "Falco default k8s_audit rules do NOT detect LIST — only GET"
  - "Tetragon cannot detect this — API-level operation, no kernel involvement"
  - "Attack is invisible to both primary runtime security tools"

remediation: |
  Restrict secrets LIST permission — most workloads only need GET on specific secrets.
  Add custom Falco rule:
    - rule: K8s Secrets Listed
      condition: >
        kevt and secret and ka.verb=list
        and non_system_user and response_successful
      output: Secrets enumerated via LIST (user=%ka.user.name ns=%ka.target.namespace)
      priority: ERROR
  
  Use projected volumes for individual secrets instead of granting broad access.
