# Technique: Secret enumeration via API
# ID: C2
# Tactic: Credential Access

id: C2
name: Secret enumeration via API
enabled: true

mitre:
  technique_id: T1552.007
  technique_name: "Unsecured Credentials: Container API"
  tactic: credential-access
  data_sources: [Container, User Account]

cis_controls:
  - "5.1.2"
  - "5.1.3"

severity: critical

description: |
  Tests whether the configured kubeconfig credentials can list secrets in
  the target namespace. Reports count and names of accessible secrets.
  Database credentials, API keys, and TLS certificates are commonly
  exposed through this vector.

  This technique uses the K8s API directly (not exec), testing the same
  permissions an attacker with stolen kubeconfig or SA token would have.

execution:
  mode: api

  api_calls:
    - resource: secrets
      verb: list

success_indicators:
  - "secrets_found"

impact:
  - "Database credentials, API keys, and TLS certificates exposed"
  - "Secrets can be base64-decoded to obtain plaintext values"
  - "Enables chain to L6 (data store access) with stolen credentials"

remediation: |
  Remove secrets list/get from the ServiceAccount's Role. Use specific
  resourceNames if the SA needs access to particular secrets.
