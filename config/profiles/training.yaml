# Training Profile Configuration
# Optimized for educational demonstrations and workshops
# Combine with a target profile: kimera -p training ...

# Kubernetes settings
kubernetes:
  namespace: "training"
  in_cluster: false

# Moderate timeouts for training pace
timeouts:
  operation: 240
  rollout: 90
  stream: 1
  command: 45

# Clear, educational logging
logging:
  level: "INFO"
  console: true
  file: "logs/kimera-training.log"

# Training mode settings
dry_run: false
debug: false
verbose: true  # Show detailed output for learning
