# Production Profile Configuration
# Optimized for production clusters with strict safety controls

# Kubernetes settings
kubernetes:
  namespace: "security-testing"  # Isolated namespace for testing
  in_cluster: false

# Production timeouts
timeouts:
  operation: 600  # Longer timeouts for production stability
  rollout: 300
  stream: 2
  command: 120

# Conservative logging
logging:
  level: "WARNING"
  console: true
  file: "/var/log/kimera/production.log"

# Safety-first defaults
dry_run: true  # Require explicit override to disable
debug: false
verbose: false

# Stricter secure defaults
secure_defaults:
  memory: "128Mi"  # Lower limits for production
  cpu: "100m"

secure_requests:
  memory: "64Mi"
  cpu: "50m"

secure_context:
  run_as_user: 10000  # Higher UID for production
  run_as_non_root: true
  allow_privilege_escalation: false
  privileged: false
  read_only_root_filesystem: true  # Strict security
  capabilities_add: []
  capabilities_drop:
    - "ALL"
