# Unguard Profile Configuration
# Target settings for the Dynatrace Unguard application
# Usage: kimera -n unguard assess  (auto-detected)
#   or:  kimera -p unguard assess

kubernetes:
  namespace: "unguard"

# Unguard services
services:
  - "unguard-payment-service"
  - "unguard-profile-service"
  - "unguard-frontend"
  - "unguard-membership-service"
  - "unguard-user-auth-service"
  - "unguard-ad-service"
  - "unguard-proxy-service"

# Exploit to service mappings
exploit_mappings:
  privileged-containers: "unguard-payment-service"
  dangerous-capabilities: "unguard-profile-service"
  host-namespace-sharing: "unguard-frontend"
  missing-resource-limits: "unguard-membership-service"
  missing-network-policies: "unguard-like-service"

# Least-privilege network topology for NetworkPolicy generation.
# Defines which pods may send ingress traffic to each service.
# Used by: kimera secure missing-network-policies and kimera generate
network_topology:
  unguard-user-auth-service:
    allowed_ingress_from:
      - {app.kubernetes.io/name: frontend}
      - {app.kubernetes.io/name: envoy-proxy}
      - {app.kubernetes.io/name: proxy-service}
  unguard-like-service:
    allowed_ingress_from:
      - {app.kubernetes.io/name: frontend}
      - {app.kubernetes.io/name: envoy-proxy}
  unguard-membership-service:
    allowed_ingress_from:
      - {app.kubernetes.io/name: frontend}
      - {app.kubernetes.io/name: envoy-proxy}
      - {app.kubernetes.io/name: proxy-service}
  unguard-microblog-service:
    allowed_ingress_from:
      - {app.kubernetes.io/name: frontend}
      - {app.kubernetes.io/name: envoy-proxy}
      - {app.kubernetes.io/name: proxy-service}
  unguard-mariadb:
    allowed_ingress_from:
      - {app.kubernetes.io/name: like-service}
      - {app.kubernetes.io/name: user-auth-service}
      - {app.kubernetes.io/name: membership-service}
      - {app.kubernetes.io/name: microblog-service}
      - {app.kubernetes.io/name: status-service}
  unguard-redis:
    allowed_ingress_from:
      - {app.kubernetes.io/name: microblog-service}
      - {app.kubernetes.io/name: status-service}
