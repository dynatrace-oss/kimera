# Development Profile Configuration
# Optimized for local testing with kind cluster and verbose output

# Kubernetes settings for local kind cluster
kubernetes:
  namespace: "unguard"
  context: "kind-kimera-test"
  in_cluster: false

# Shorter timeouts for faster development iteration
timeouts:
  operation: 180
  rollout: 60
  stream: 1
  command: 30

# Verbose logging for debugging
logging:
  level: "DEBUG"
  console: true
  file: "logs/kimera-dev.log"

# Safe defaults for development
dry_run: false
debug: true
verbose: true

# Development services (subset for testing)
services:
  - "unguard-payment-service"
  - "unguard-profile-service"
  - "unguard-frontend"
  - "unguard-membership-service"

exploit_mappings:
  privileged-containers: "unguard-payment-service"
  dangerous-capabilities: "unguard-profile-service"
  host-namespace-sharing: "unguard-frontend"
  missing-resource-limits: "unguard-membership-service"
