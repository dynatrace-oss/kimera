# Default Configuration for Kimera
# Application-agnostic defaults. Use profiles for target-specific settings.
# Example: kimera -p unguard assess

# Kubernetes cluster configuration
kubernetes:
  namespace: "default"
  context: null  # Use current context from kubeconfig
  in_cluster: false
  kubeconfig_path: null  # Use default kubeconfig location

# Target services (empty by default — set via profile or auto-discovered)
services: []

# Exploit to service mappings (empty by default — set via profile)
exploit_mappings: {}

# Timeout configuration (seconds)
timeouts:
  operation: 300
  rollout: 120
  stream: 1
  command: 60

# Logging configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: null  # No file logging by default
  console: true

# Execution modes
dry_run: false
debug: false
verbose: false

# Secure defaults for remediation
secure_defaults:
  memory: "256Mi"
  cpu: "200m"

secure_requests:
  memory: "128Mi"
  cpu: "100m"

secure_context:
  run_as_user: 1000
  run_as_non_root: true
  allow_privilege_escalation: false
  privileged: false
  read_only_root_filesystem: false
  capabilities_add: []
  capabilities_drop:
    - "ALL"
